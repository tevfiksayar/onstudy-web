<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | onStudy</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#12131C">
    <link rel="apple-touch-icon" href="assets/logo.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body style="margin: 0; min-height: 100vh; display: flex; flex-direction: column;">
    
    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
        <div class="auth-container" style="width: 100%; max-width: 400px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="margin-bottom: 5px;">onStudy</h1>
                <p style="color: var(--text-muted); font-size: 0.95rem; font-weight: 400; letter-spacing: 0.5px; margin: 0;">Sınav yolculuğunda dijital kütüphanen</p>
            </div>

            <form id="auth-form">
                <h2 id="form-title" style="margin-top: 0;">Giriş Yap</h2>
                
                <input type="email" id="email" placeholder="E-posta" required>
                <input type="password" id="password" placeholder="Şifre" required>
                
                <div id="forgot-password-container" style="text-align: right; margin-top: -10px; margin-bottom: 20px;">
                    <a href="#" onclick="resetPassword(event)" style="color: var(--text-muted); font-size: 0.85rem; text-decoration: none; transition: 0.2s;" onmouseover="this.style.color='var(--primary-purple)'" onmouseout="this.style.color='var(--text-muted)'">Şifremi unuttum</a>
                </div>
                
                <button type="submit" id="submit-btn" style="width: 100%; margin-top: 10px;">Giriş Yap</button>
                <p style="text-align: center; margin-top: 15px;">Hesabın yok mu? <a href="#" id="toggle-auth" style="color: var(--primary-purple); font-weight: 600; text-decoration: none;">Kayıt ol</a></p>

                <div id="guest-login-section">
                    <div style="display: flex; align-items: center; margin: 25px 0; color: rgba(255,255,255,0.2);">
                        <hr style="flex: 1; border: none; border-top: 1px solid rgba(255,255,255,0.1);">
                        <span style="padding: 0 15px; font-size: 0.85rem;">VEYA</span>
                        <hr style="flex: 1; border: none; border-top: 1px solid rgba(255,255,255,0.1);">
                    </div>
                    <button type="button" onclick="guestLogin()" style="width: 100%; background: transparent; border: 1px solid var(--text-muted); color: var(--text-light); box-shadow: none;">Misafir Olarak İncele</button>
                </div>
            </form>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>

    <footer style="text-align: center; padding: 30px 20px; border-top: 1px solid rgba(255,255,255,0.05); width: 100%; box-sizing: border-box;">
        <p style="margin: 0; color: var(--text-muted); font-size: 0.85rem; letter-spacing: 0.5px;">
            Geliştirici: 
            <a href="https://linkedin.com/in/ahmettevfiksayar" target="_blank" style="color: var(--text-light); text-decoration: none; font-weight: 600; transition: color 0.2s;" onmouseover="this.style.color='var(--primary-purple)'" onmouseout="this.style.color='var(--text-light)'">Ahmet Tevfik Sayar</a>
        </p>
        <p style="margin: 5px 0 0 0; font-size: 0.75rem; color: rgba(255,255,255,0.3);">© 2026 onStudy. Tüm hakları saklıdır.</p>
    </footer>

</body>
</html>
